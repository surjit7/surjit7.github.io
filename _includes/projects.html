<section id="projects" class="section projects-section">
  <div class="container">
    <h2>Featured Projects</h2>
    <div class="project-grid">
      {% for project in site.projects %}
      <article class="project-card">
        <h3 class="project-title">{{ project.title }}</h3>
        <p class="project-description">{{ project.excerpt | strip_html | truncate: 150 }}</p>
        <div class="project-tags">
          {% for tag in project.tags %}
          <span class="badge">{{ tag }}</span>
          {% endfor %}
        </div>
        <div class="project-links">
          {% if project.github_url %}
          <a href="{{ project.github_url }}" class="btn secondary" target="_blank" rel="noopener">GitHub</a>
          {% endif %}
          {% if project.docs_url %}
          <a href="{{ project.docs_url }}" class="btn secondary" target="_blank" rel="noopener">Docs</a>
          {% endif %}
        </div>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
