title: "Surjit Singh | Software Engineer"
description: "Personal portfolio of a senior software engineer showcasing AI infrastructure, authentication platforms, and distributed systems."
url: "https://surjit7.github.io"
baseurl: ""
author:
  name: "Surjit Singh"
  email: "surjit@protonmail.com"
  github: "https://github.com/surjit7"
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
collections:
  projects:
    output: true
    permalink: /projects/:title/
markdown: kramdown
kramdown:
  input: GFM
permalink: /:categories/:year/:month/:day/:title/
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - .jekyll-cache
# Disable Jekyll cache to avoid permission issues
# Jekyll's built-in cache control via environment variable
JEKYLL_ENV: production
